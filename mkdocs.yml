site_name: Discord德语学习文档
site_description: Discord德语学习系统完整文档中心
site_author: menjinqiu
repo_url: https://github.com/menjinqiu/deutsch-lernen-docs
repo_name: menjinqiu/deutsch-lernen-docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate

plugins:
  - search

nav:
  - 首页: index.md
  - 入门指南:
    - 系统概述: getting-started/overview.md
    - 快速开始: getting-started/quick-start.md
  - 频道指南:
    - 频道总览: channels/index.md
    - 主频道指南: channels/main-channel.md
    - 笔记频道指南: channels/notes-channel.md
  - 学习方法:
    - 完整学习指南: learning/complete-learning-guide.md
    - 学习指南: learning/index.md
    - 每日流程: learning/daily-routine.md
    - 周计划模板: learning/weekly-plan-template.md
    - 第1个月计划: learning/month-1-plan.md
  - 工具指南:
    - 工具总览: tools/index.md
    - Notion同步系统: tools/notion-sync-system.md
  - 学习资源: resources/index.md
  - 学习历程:
    - 历程记录指南: journey/index.md
    - 系统创建里程碑: journey/milestone-2026-04-07-system-creation.md
    - 系统优化总结: journey/system-optimization-summary.md
  - 知识网络:
    - 知识网络系统: knowledge-network/index.md
    - 单元 L1 知识: knowledge-network/unit-l1.md
    - 单元 L2 知识: knowledge-network/unit-l2.md
    - 单元 L3 知识: knowledge-network/unit-l3.md
    - 词汇知识网络: knowledge-network/vocabulary-network.md
    - 语法知识网络: knowledge-network/grammar-network.md
    - 发音知识网络: knowledge-network/pronunciation-network.md
    - 表达知识网络: knowledge-network/expression-network.md
  - 知识库系统:
    - 知识库总览: knowledge-library/index.md
    - L1单元知识库: knowledge-library/units/L1.md
    - L2单元知识库: knowledge-library/units/L2.md
    - 词汇知识库: knowledge-library/categories/vocabulary.md
    - 语法知识库: knowledge-library/categories/grammar.md
    - 发音知识库: knowledge-library/categories/pronunciation.md
    - 表达知识库: knowledge-library/categories/expression.md
    - 知识搜索: knowledge-library/search.md
    - 学习路径: knowledge-library/learning-paths.md

markdown_extensions:
  - admonition
  - codehilite
  - extra
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/menjinqiu
    - icon: fontawesome/brands/discord
      link: https://discord.gg/

