site_name: Discord德语学习文档
site_description: Discord德语学习系统完整文档中心
site_author: menjinqiu
repo_url: https://github.com/menjinqiu/deutsch-lernen-docs
repo_name: menjinqiu/deutsch-lernen-docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate

plugins:
  - search

nav:
  - 首页: index.md
  - 入门指南:
    - 系统概述: getting-started/overview.md
    - 快速开始: getting-started/quick-start.md
  - 频道指南:
    - 频道总览: channels/index.md
    - 主频道指南: channels/main-channel.md
  - 学习方法:
    - 学习指南: learning/index.md
    - 每日流程: learning/daily-routine.md
  - 工具指南: tools/index.md
  - 学习资源: resources/index.md

markdown_extensions:
  - admonition
  - codehilite
  - extra
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/menjinqiu
    - icon: fontawesome/brands/discord
      link: https://discord.gg/

copyright: |
